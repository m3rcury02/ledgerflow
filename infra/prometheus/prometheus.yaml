global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yaml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: ledgerflow-otel-collector
    static_configs:
      - targets: [otel-collector:8889]

  - job_name: ledgerflow-otel-collector-internal
    static_configs:
      - targets: [otel-collector:8888]

  - job_name: ledgerflow
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:8082]
        labels:
          service: ledgerflow
          environment: local
