name: Security scan

# scripts/security-scan needs privileged read-only Docker-socket access to inspect every
# Compose image and downloads fresh vulnerability intelligence on each run. Per
# docs/development-workflow.md it is deliberately kept out of the pull_request-triggered
# ci.yml workflow so a fork-originated pull request never gets Docker-socket access; it
# runs only on pushes to main and on a schedule, matching the script's documented intent.
on:
  push:
    branches: [main]
  schedule:
    - cron: "43 4 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security-scan:
    name: Trivy secret, dependency, and Compose image scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Run security scan
        run: ./scripts/security-scan

      - name: Upload Gradle build log on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: security-scan-build-output
          path: application/build/libs/**
          retention-days: 14
