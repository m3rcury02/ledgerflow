name: "CodeQL Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    - name: Initialize CodeQL
      uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a
      with:
        languages: java

    - name: Set up Java 25
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
      with:
        gradle-version: wrapper

    - name: Build Application
      run: ./gradlew --no-daemon :application:bootJar --console=plain

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a
