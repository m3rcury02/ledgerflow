name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: java-kotlin
          build-mode: manual

      # Manual build mode compiles every subproject's main sources without running the
      # full test/integration suite, keeping this workflow independent of `verify` (which
      # already runs separately in ci.yml) while still giving CodeQL a complete build to
      # analyze. `clean` alone is not enough: this project sets `org.gradle.caching=true`
      # (gradle.properties), so a cache-hit compileJava restores compiled output straight
      # from the build cache (`FROM-CACHE`) without invoking javac at all - CodeQL's build
      # tracer only sees real compiler invocations, so a cache hit here still fails with
      # "didn't build any of it." `--no-build-cache` forces a real compile for this one
      # invocation; dependency resolution still benefits from `cache: gradle` above.
      - name: Build for analysis
        run: ./gradlew --no-daemon --no-build-cache clean compileJava

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          category: "/language:java-kotlin"
