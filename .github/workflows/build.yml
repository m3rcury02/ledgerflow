name: Build and Verify

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Java 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
        with:
          gradle-version: wrapper

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92

      - name: Build and Verify
        run: ./gradlew --no-daemon clean verify --console=plain

      - name: Run Security Scan
        run: ./scripts/security-scan

      - name: Generate SBOM
        run: |
          docker run --rm \
            --volume "${PWD}:/workspace" \
            ghcr.io/aquasecurity/trivy:0.72.0 \
            rootfs /workspace/application/build/libs \
            --format cyclonedx \
            --output /workspace/sbom.json

      - name: Build Application Container
        run: docker build -t ledgerflow:latest .

      - name: Scan Application Container
        run: |
          docker run --rm \
            --volume /var/run/docker.sock:/var/run/docker.sock:ro \
            --volume "${PWD}:/workspace" \
            ghcr.io/aquasecurity/trivy:0.72.0 \
            image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 ledgerflow:latest

      - name: Validate Git Cleanliness
        run: git diff --check

      - name: Upload Test Reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/reports/checkstyle/
          retention-days: 14

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom
          path: sbom.json
          retention-days: 14
