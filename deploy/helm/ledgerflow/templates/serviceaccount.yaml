{{- if .Values.serviceAccount.create }}
# No Role/RoleBinding is granted to either ServiceAccount: the application never calls the
# Kubernetes API, so the correct least-privilege posture is zero API access, not a narrowly
# scoped Role (docs/plans/portfolio-extension-execplan.md, Milestone 4 Decision log).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ledgerflow-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ledgerflow.selectorLabels.api" . | nindent 4 }}
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ledgerflow-worker
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ledgerflow.selectorLabels.worker" . | nindent 4 }}
automountServiceAccountToken: false
{{- end }}
