# ClusterIP only, API role only. The worker Deployment is deliberately never targeted by a
# Service. Host access uses `kubectl port-forward`, not a NodePort, so the chart reserves no host
# port and the worker remains unreachable through a Service.
apiVersion: v1
kind: Service
metadata:
  name: ledgerflow-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ledgerflow.selectorLabels.api" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "ledgerflow.selectorLabels.api" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.containerPort }}
      targetPort: http
    - name: management
      port: {{ .Values.managementPort }}
      targetPort: management
