{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ledgerflow.fullname" . }}
  labels:
    {{- include "ledgerflow.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ledgerflow.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Public API traffic
    - ports:
        - protocol: TCP
          port: 8080
    # Management / Probes traffic
    - ports:
        - protocol: TCP
          port: 9000
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Database
    - ports:
        - protocol: TCP
          port: 5432
    # Kafka
    - ports:
        - protocol: TCP
          port: 9092
    # Telemetry (Prometheus, OTel, etc)
    - ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
        - protocol: TCP
          port: 9464
{{- end }}
