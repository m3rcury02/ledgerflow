# Local-only placeholder credentials — see values.yaml's `secrets` block comment. Never a
# production secret; override via a separate, uncommitted values file for any non-local use.
apiVersion: v1
kind: Secret
metadata:
  name: ledgerflow-db-credentials
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ledgerflow.labels" . | nindent 4 }}
type: Opaque
stringData:
  LEDGERFLOW_DB_USERNAME: {{ .Values.secrets.dbUsername | quote }}
  LEDGERFLOW_DB_PASSWORD: {{ .Values.secrets.dbPassword | quote }}
