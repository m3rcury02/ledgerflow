replicaCount: 2

image:
  repository: ledgerflow
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 8080
  managementPort: 9000

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1024Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

env:
  SPRING_PROFILES_ACTIVE: "prod"
  LOGGING_LEVEL_ROOT: "INFO"
  LEDGERFLOW_MANAGEMENT_PORT: "9000"
  # Placeholders for secrets
  SPRING_DATASOURCE_URL: "jdbc:postgresql://ledgerflow-local-postgres-1:5432/ledgerflow"
  SPRING_DATASOURCE_USERNAME: "ledgerflow_user"
  SPRING_DATASOURCE_PASSWORD: "placeholder_password"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "ledgerflow-local-kafka-1:9092"
  LEDGERFLOW_OAUTH2_ISSUER: "http://keycloak:8080/realms/ledgerflow"
  LEDGERFLOW_OAUTH2_JWK_SET_URI: "http://keycloak:8080/realms/ledgerflow/protocol/openid-connect/certs"
