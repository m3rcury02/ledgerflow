spring:
  datasource:
    hikari:
      maximum-pool-size: 4
      minimum-idle: 0
  kafka:
    admin:
      auto-create: false
    listener:
      auto-startup: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://issuer.integration-test.invalid
          jwk-set-uri: https://issuer.integration-test.invalid/jwks

management:
  logging:
    export:
      otlp:
        enabled: false
  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    export:
      otlp:
        enabled: false
