openapi: 3.1.0
info:
  title: LedgerFlow API
  version: 0.5.0
  description: >-
    LedgerFlow's contract-first HTTP API. Creating an INR order synchronously drives the mock
    payment authorization/capture and durable financial finalization. Outbox publication and
    notification processing are asynchronous and are not prerequisites for the HTTP result.
servers:
  - url: http://localhost:8080
    description: Local application
tags:
  - name: Orders
  - name: Operator recovery
paths:
  /api/v1/orders:
    post:
      tags: [Orders]
      operationId: createOrder
      summary: Create an order idempotently
      description: >-
        Creates and advances one INR order for the authenticated subject. Provider authorization
        and capture are synchronous, while outbox publication and notification processing remain
        asynchronous. Reusing the same Idempotency-Key with the same canonical request returns the
        original business result; reusing it with a different request returns 409. An unknown
        provider outcome is looked up using the original operation ID before any same-ID resend.
        The JWT must have the ledgerflow.orders.write scope and customer or admin realm role. Query
        parameters, compressed bodies, duplicate/unknown JSON properties, and request bodies larger
        than 16 KiB are rejected.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
            examples:
              standardOrder:
                summary: INR order
                value:
                  clientReference: checkout-20260713-0001
                  amount:
                    amountMinor: 259900
                    currency: INR
                  paymentMethodReference: pm_mock_success
      responses:
        "201":
          description: >-
            Original or replayed terminal order result. COMPLETED means payment CAPTURED and the
            balanced journal plus durable outbox event committed; it does not mean Kafka publication
            or notification processing completed. PAYMENT_DECLINED is also a terminal created order.
          headers:
            Location:
              $ref: "#/components/headers/Location"
            X-Correlation-Id:
              $ref: "#/components/headers/CorrelationId"
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
              examples:
                completed:
                  $ref: "#/components/examples/CompletedOrder"
                declined:
                  $ref: "#/components/examples/DeclinedOrder"
        "202":
          description: >-
            The order and stable provider identities are durable, but a bounded temporary or unknown
            provider outcome requires a later retry with the same Idempotency-Key.
          headers:
            Location:
              $ref: "#/components/headers/Location"
            X-Correlation-Id:
              $ref: "#/components/headers/CorrelationId"
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
              examples:
                retryPending:
                  $ref: "#/components/examples/RetryPendingOrder"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "406":
          $ref: "#/components/responses/NotAcceptable"
        "409":
          description: The idempotency key was already used for a different canonical request
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/CorrelationId"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                keyReused:
                  value:
                    type: https://ledgerflow.example/problems/idempotency-key-reused
                    title: Idempotency key reused
                    status: 409
                    detail: The idempotency key was already used with a different request.
                    instance: /api/v1/orders
                    code: idempotency_key_reused
                    correlationId: order-conflict-001
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          description: The request uses a well-formed currency that this MVP does not support
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/CorrelationId"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                unsupportedCurrency:
                  value:
                    type: https://ledgerflow.example/problems/unsupported-currency
                    title: Unsupported currency
                    status: 422
                    detail: The MVP supports INR only.
                    instance: /api/v1/orders
                    code: unsupported_currency
                    correlationId: order-currency-001
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          description: >-
            The provider returned malformed or contradictory data. The failed order remains
            owner-readable at Location, and an identical idempotent replay returns this outcome.
          headers:
            Location:
              $ref: "#/components/headers/Location"
            X-Correlation-Id:
              $ref: "#/components/headers/CorrelationId"
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                providerProtocol:
                  value:
                    type: https://ledgerflow.example/problems/provider-protocol-error
                    title: Payment provider protocol error
                    status: 502
                    detail: The payment provider returned an invalid response.
                    instance: /api/v1/orders
                    code: provider_protocol_error
                    correlationId: order-provider-001
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "429":
          $ref: "#/components/responses/RateLimited"
  /api/v1/orders/{orderId}:
    get:
      tags: [Orders]
      operationId: getOrder
      summary: Get the current owned order
      description: >-
        Requires the ledgerflow.orders.read scope and customer or admin realm role. Missing orders
        and orders owned by another JWT subject both return the same 404 response.
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: 019535d9-3df7-79fb-b466-fa907fa17f9e
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Current order representation
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/CorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
              examples:
                current:
                  $ref: "#/components/examples/CompletedOrder"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "406":
          $ref: "#/components/responses/NotAcceptable"
        "404":
          description: Order absent or not owned by the authenticated subject
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/CorrelationId"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              examples:
                notFound:
                  value:
                    type: https://ledgerflow.example/problems/resource-not-found
                    title: Resource not found
                    status: 404
                    detail: The requested order was not found.
                    instance: /api/v1/orders/019535d9-3df7-79fb-b466-fa907fa17f9e
                    code: resource_not_found
                    correlationId: order-read-001
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/operator/operations:
    get:
      tags: [Operator recovery]
      operationId: listFailedOperations
      summary: List sanitized recoverable failures
      description: >-
        Requires ledgerflow.operations.read plus an operator or admin realm role. Results contain
        bounded operational metadata only; customer identity and source payloads are never exposed.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
            maxLength: 256
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/OperationType"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Sanitized keyset-paginated failure page
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/CorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailedOperationPage"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/operator/operations/{operationId}:
    get:
      tags: [Operator recovery]
      operationId: getFailedOperation
      summary: Get sanitized operation details and attempt history
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OperationId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Sanitized failure details
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/CorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailedOperationDetail"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/OperationNotFound"
  /api/v1/operator/operations/{operationId}/retries:
    post:
      tags: [Operator recovery]
      operationId: requestOperationRetry
      summary: Idempotently request a guarded recovery attempt
      description: >-
        Requires ledgerflow.operations.retry plus an operator or admin realm role. One active command
        is permitted per operation. After the automatic-attempt limit, a separate unused break-glass
        approval must be supplied. The reason becomes immutable audit evidence.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OperationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetryRequest"
            example:
              reason: Provider incident resolved; reconcile the original operation.
      responses:
        "202":
          description: Original or replayed retry command
          headers:
            Location:
              description: Retry-status resource
              schema:
                type: string
            X-Correlation-Id:
              $ref: "#/components/headers/CorrelationId"
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryStatus"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/OperationNotFound"
        "409":
          $ref: "#/components/responses/OperationConflict"
  /api/v1/operator/operations/{operationId}/retries/{retryId}:
    get:
      tags: [Operator recovery]
      operationId: getOperationRetry
      summary: Get sanitized retry status
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OperationId"
        - name: retryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Current retry status
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/CorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryStatus"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/OperationNotFound"
  /api/v1/operator/operations/{operationId}/break-glass-approvals:
    post:
      tags: [Operator recovery]
      operationId: approveBreakGlassRecovery
      summary: Record separate immutable break-glass approval evidence
      description: >-
        Requires ledgerflow.operations.break-glass plus the admin role. Approval does not execute a
        retry and can be consumed once by a later retry request for the same operation.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/OperationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BreakGlassApprovalRequest"
      responses:
        "201":
          description: Original or replayed immutable approval evidence
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/CorrelationId"
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BreakGlassApproval"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/OperationNotFound"
        "409":
          $ref: "#/components/responses/OperationConflict"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        OAuth 2.0/OIDC JWT with the configured exact issuer and ledgerflow-api audience, signed with
        RS256. Order routes require their order scope plus customer/admin role. Operator routes
        require their distinct read, retry, or break-glass scope plus the documented operator/admin
        role.
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: >-
        Case-sensitive client nonce. Validated before hashing; raw values are never persisted or
        logged.
      schema:
        type: string
        minLength: 8
        maxLength: 128
        pattern: "^[A-Za-z0-9._:-]+$"
      example: order-019535d9-3df7-79fb
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: Invalid or absent values are replaced by the server.
      schema:
        type: string
        minLength: 1
        maxLength: 64
        pattern: "^[A-Za-z0-9._-]+$"
      example: checkout-order-001
    OperationId:
      name: operationId
      in: path
      required: true
      description: Opaque typed identifier returned by the failed-operation listing.
      schema:
        type: string
        minLength: 43
        maxLength: 48
        pattern: "^(payment|outbox|dead-letter)_[0-9a-f-]{36}$"
      example: payment_019535d9-4a20-7e29-9d35-a6e4aeab9e09
  headers:
    Location:
      description: Canonical path of the created order
      schema:
        type: string
        example: /api/v1/orders/019535d9-3df7-79fb-b466-fa907fa17f9e
    CorrelationId:
      description: Valid correlation ID used for this HTTP operation
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 64
        pattern: "^[A-Za-z0-9._-]+$"
    IdempotencyReplayed:
      description: Present and true only when the original result is replayed
      required: false
      schema:
        type: boolean
  schemas:
    CreateOrderRequest:
      type: object
      additionalProperties: false
      required: [amount, paymentMethodReference]
      properties:
        clientReference:
          type: string
          minLength: 1
          maxLength: 100
          pattern: "^\\S(?:.*\\S)?$"
          example: checkout-20260713-0001
        amount:
          $ref: "#/components/schemas/Money"
        paymentMethodReference:
          type: string
          minLength: 9
          maxLength: 128
          pattern: "^pm_mock_[a-z_]+$"
          description: >-
            Opaque local/test mock-provider token. It is included in idempotency hashing, is never
            returned or logged, and must never contain card data or real payment credentials.
          example: pm_mock_success
    Money:
      type: object
      additionalProperties: false
      required: [amountMinor, currency]
      properties:
        amountMinor:
          type: integer
          format: int64
          minimum: 1
          example: 259900
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          enum: [INR]
    Order:
      type: object
      additionalProperties: false
      required: [orderId, status, amount, payment, createdAt, updatedAt]
      properties:
        orderId:
          type: string
          format: uuid
          description: PostgreSQL 18 UUIDv7 identifier
          example: 019535d9-3df7-79fb-b466-fa907fa17f9e
        clientReference:
          type:
            - string
            - "null"
          minLength: 1
          maxLength: 100
        status:
          type: string
          enum:
            - CREATED
            - PAYMENT_PROCESSING
            - COMPLETED
            - PAYMENT_DECLINED
            - PAYMENT_RETRY_PENDING
            - FAILED
        amount:
          $ref: "#/components/schemas/Money"
        payment:
          description: >-
            Payment workflow state for Milestone 6 orders. Null is retained only so historical
            pre-Milestone-6 CREATED orders remain readable after an in-place database upgrade.
          oneOf:
            - $ref: "#/components/schemas/PaymentSummary"
            - type: "null"
        createdAt:
          type: string
          format: date-time
          example: 2026-07-13T09:42:00Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-07-13T09:42:01Z
    PaymentSummary:
      type: object
      additionalProperties: false
      required: [paymentId, status]
      properties:
        paymentId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - CREATED
            - AUTHORIZING
            - AUTHORIZED
            - DECLINED
            - AUTHORIZATION_RETRY_PENDING
            - AUTHORIZATION_UNKNOWN
            - CAPTURING
            - CAPTURE_CONFIRMED
            - CAPTURE_ACCOUNTED
            - CAPTURED
            - CAPTURE_DECLINED
            - CAPTURE_RETRY_PENDING
            - CAPTURE_UNKNOWN
            - FAILED
        failureCode:
          type:
            - string
            - "null"
          maxLength: 64
          pattern: "^[A-Z0-9_]+$"
          example: AUTHORIZATION_DECLINED
    OperationType:
      type: string
      enum: [PAYMENT, OUTBOX, DEAD_LETTER]
    FailedOperationSummary:
      type: object
      additionalProperties: false
      required: [operationId, operationType, status, summary, attemptCount, failedAt, updatedAt, retryable]
      properties:
        operationId:
          type: string
        operationType:
          $ref: "#/components/schemas/OperationType"
        status:
          type: string
          maxLength: 64
        failureCode:
          type: [string, "null"]
          maxLength: 64
        summary:
          type: string
          maxLength: 200
        attemptCount:
          type: integer
          format: int64
          minimum: 0
        failedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        retryable:
          type: boolean
    FailedOperationPage:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/FailedOperationSummary"
        nextCursor:
          type: [string, "null"]
          maxLength: 256
    FailedOperationDetail:
      type: object
      additionalProperties: false
      required: [operation, attempts]
      properties:
        operation:
          $ref: "#/components/schemas/FailedOperationSummary"
        attempts:
          type: array
          maxItems: 200
          items:
            $ref: "#/components/schemas/OperationAttempt"
    OperationAttempt:
      type: object
      additionalProperties: false
      required: [source, action, attemptNumber, outcome, recordedAt]
      properties:
        source:
          type: string
          maxLength: 32
        action:
          type: string
          maxLength: 64
        attemptNumber:
          type: integer
          minimum: 0
        outcome:
          type: string
          maxLength: 64
        failureCode:
          type: [string, "null"]
          maxLength: 64
        recordedAt:
          type: string
          format: date-time
    RetryRequest:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 10
          maxLength: 500
          pattern: "^[^\\r\\n\\p{Cc}]+$"
        approvalId:
          type: [string, "null"]
          format: uuid
    RetryStatus:
      type: object
      additionalProperties: false
      required: [retryId, operationId, status, attemptKind, attemptNumber, acceptedAt, replayed]
      properties:
        retryId:
          type: string
          format: uuid
        operationId:
          type: string
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, WAITING, COMPLETED, FAILED]
        attemptKind:
          type: string
          enum: [AUTOMATIC, BREAK_GLASS]
        attemptNumber:
          type: integer
          minimum: 1
        resultCode:
          type: [string, "null"]
          maxLength: 64
        failureCode:
          type: [string, "null"]
          maxLength: 64
        acceptedAt:
          type: string
          format: date-time
        completedAt:
          type: [string, "null"]
          format: date-time
        replayed:
          type: boolean
          description: True only when the original retry-command result was returned.
    BreakGlassApprovalRequest:
      type: object
      additionalProperties: false
      required: [approvalReference, reason]
      properties:
        approvalReference:
          type: string
          minLength: 10
          maxLength: 100
          pattern: "^[A-Za-z0-9][A-Za-z0-9._:/#-]{9,99}$"
        reason:
          type: string
          minLength: 10
          maxLength: 500
          pattern: "^[^\\r\\n\\p{Cc}]+$"
    BreakGlassApproval:
      type: object
      additionalProperties: false
      required: [approvalId, operationId, createdAt, replayed]
      properties:
        approvalId:
          type: string
          format: uuid
        operationId:
          type: string
        createdAt:
          type: string
          format: date-time
        replayed:
          type: boolean
          description: True only when the original approval result was returned.
    ValidationError:
      type: object
      additionalProperties: false
      required: [field, code]
      properties:
        field:
          type: string
          example: /amount/amountMinor
        code:
          type: string
          example: must_be_positive
    Problem:
      type: object
      additionalProperties: true
      required: [type, title, status, detail, instance, code, correlationId]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        instance:
          type: string
        code:
          type: string
          pattern: "^[a-z0-9_]+$"
        correlationId:
          type: string
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ValidationError"
  responses:
    OperationNotFound:
      description: The typed operation or retry resource does not exist
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    OperationConflict:
      description: The recovery command conflicts with current state, cooldown, limits, or idempotency
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    InvalidRequest:
      description: Request body, path, or required header is invalid
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            invalidRequest:
              value:
                type: https://ledgerflow.example/problems/invalid-request
                title: Invalid request
                status: 400
                detail: The request is invalid.
                instance: /api/v1/orders
                code: invalid_request
                correlationId: generated-correlation-id
                errors:
                  - field: /headers/Idempotency-Key
                    code: invalid_format
    Unauthorized:
      description: Missing or invalid bearer token
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Forbidden:
      description: Authenticated principal lacks the required scope or realm role
      headers:
        X-Correlation-Id:
          $ref: "#/components/headers/CorrelationId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotAcceptable:
      description: The requested response media type is not supported
      headers:
