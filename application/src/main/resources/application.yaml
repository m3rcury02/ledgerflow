spring:
  application:
    name: ledgerflow
  datasource:
    url: ${LEDGERFLOW_DB_URL:jdbc:postgresql://localhost:5432/ledgerflow}
    username: ${LEDGERFLOW_DB_USERNAME:ledgerflow}
    password: ${LEDGERFLOW_DB_PASSWORD}
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          audiences: ${LEDGERFLOW_OAUTH2_AUDIENCE:ledgerflow-api}
          issuer-uri: ${LEDGERFLOW_OAUTH2_ISSUER}
          jwk-set-uri: ${LEDGERFLOW_OAUTH2_JWK_SET_URI}
          jws-algorithms: RS256
  kafka:
    bootstrap-servers: ${LEDGERFLOW_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    admin:
      auto-create: false
    consumer:
      enable-auto-commit: false
      group-id: ${LEDGERFLOW_KAFKA_NOTIFICATION_GROUP:ledgerflow-notifications-v1}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record
      observation-enabled: true
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        delivery.timeout.ms: 10000
        request.timeout.ms: 5000
        max.block.ms: 5000
    template:
      observation-enabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: true

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

server:
  error:
    include-message: never

logging:
  structured:
    format:
      console: ecs

ledgerflow:
  messaging:
    topic: ${LEDGERFLOW_KAFKA_PAYMENT_CAPTURED_TOPIC:ledgerflow.payment-captured.v1}
    dead-letter-topic: ${LEDGERFLOW_KAFKA_PAYMENT_CAPTURED_DLT_TOPIC:ledgerflow.payment-captured.v1.dlt}
    publisher-enabled: ${LEDGERFLOW_OUTBOX_PUBLISHER_ENABLED:false}
    publisher-poll-interval: ${LEDGERFLOW_OUTBOX_POLL_INTERVAL:1s}
    publisher-initial-delay: ${LEDGERFLOW_OUTBOX_INITIAL_DELAY:1s}
    batch-size: ${LEDGERFLOW_OUTBOX_BATCH_SIZE:25}
    lease-duration: ${LEDGERFLOW_OUTBOX_LEASE_DURATION:30s}
    acknowledgement-timeout: ${LEDGERFLOW_KAFKA_ACK_TIMEOUT:10s}
    max-publish-attempts: ${LEDGERFLOW_OUTBOX_MAX_ATTEMPTS:10}
    publisher-base-backoff: ${LEDGERFLOW_OUTBOX_BASE_BACKOFF:1s}
    publisher-max-backoff: ${LEDGERFLOW_OUTBOX_MAX_BACKOFF:256s}
    publisher-jitter-ratio: ${LEDGERFLOW_OUTBOX_JITTER_RATIO:0.2}
  notifications:
    enabled: ${LEDGERFLOW_NOTIFICATION_CONSUMER_ENABLED:false}
    dlt-enabled: ${LEDGERFLOW_NOTIFICATION_DLT_CONSUMER_ENABLED:false}
    topic: ${LEDGERFLOW_KAFKA_PAYMENT_CAPTURED_TOPIC:ledgerflow.payment-captured.v1}
    dead-letter-topic: ${LEDGERFLOW_KAFKA_PAYMENT_CAPTURED_DLT_TOPIC:ledgerflow.payment-captured.v1.dlt}
    group-id: ${LEDGERFLOW_KAFKA_NOTIFICATION_GROUP:ledgerflow-notifications-v1}
    dead-letter-group-id: ${LEDGERFLOW_KAFKA_NOTIFICATION_DLT_GROUP:ledgerflow-notifications-dlt-v1}
    consumer-name: ${LEDGERFLOW_KAFKA_NOTIFICATION_CONSUMER:ledgerflow-notifications-v1}
    first-retry-backoff: ${LEDGERFLOW_NOTIFICATION_FIRST_RETRY_BACKOFF:1s}
    second-retry-backoff: ${LEDGERFLOW_NOTIFICATION_SECOND_RETRY_BACKOFF:5s}
    third-retry-backoff: ${LEDGERFLOW_NOTIFICATION_THIRD_RETRY_BACKOFF:30s}
    broker-acknowledgement-timeout: ${LEDGERFLOW_KAFKA_ACK_TIMEOUT:10s}
    replay-lease-duration: ${LEDGERFLOW_REPLAY_LEASE_DURATION:30s}
  payment:
    provider:
      connect-timeout: ${LEDGERFLOW_PAYMENT_PROVIDER_CONNECT_TIMEOUT:1s}
      request-timeout: ${LEDGERFLOW_PAYMENT_PROVIDER_REQUEST_TIMEOUT:2s}
      max-attempts: ${LEDGERFLOW_PAYMENT_PROVIDER_MAX_ATTEMPTS:2}
      base-backoff: ${LEDGERFLOW_PAYMENT_PROVIDER_BASE_BACKOFF:200ms}
      max-backoff: ${LEDGERFLOW_PAYMENT_PROVIDER_MAX_BACKOFF:1s}
      backoff-multiplier: ${LEDGERFLOW_PAYMENT_PROVIDER_BACKOFF_MULTIPLIER:2.0}
      jitter-ratio: ${LEDGERFLOW_PAYMENT_PROVIDER_JITTER_RATIO:0.2}
